version: '3.8'

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: meh-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: plataforma_meh
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Solo comunicación interna — no exponer puerto
    expose:
      - "5432"

  # Backend FastAPI
  backend:
    build: ./backend
    container_name: meh-backend
    restart: always
    env_file: backend/.env.docker
    environment:
      # RUN_SEED: "" (vacío/no seteado => solo migraciones, sin seed)
      #           "basic" => seed con usuarios staff
      #           "super" => seed completo (20 miembros, eventos, cursos, etc.)
      - RUN_SEED=super
    depends_on:
      - db
    # Solo comunicación interna — no exponer puerto
    expose:
      - "8000"
    volumes:
      - ./backend/static:/app/static

  # Frontend React (SPA con nginx)
  frontend:
    build:
      context: ./frontend
      args:
        # En desarrollo/proxy, la API se accede por mismo origen: /api/
        - VITE_API_URL=/api/
    container_name: meh-frontend
    restart: always
    # Solo comunicación interna — no exponer puerto
    expose:
      - "80"
    depends_on:
      - backend

  # Documentación (Docusaurus)
  website:
    build: ./website
    container_name: meh-docs
    restart: always
    # Solo comunicación interna — no exponer puerto
    expose:
      - "80"

  # Reverse proxy Nginx — único punto de entrada
  nginx-proxy:
    build: ./nginx
    container_name: meh-proxy
    restart: always
    ports:
      - "8099:80"
    depends_on:
      - backend
      - frontend
      - website

  # Monitoreo Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: meh-prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    expose:
      - "9090"

  # Monitoreo Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: meh-grafana
    restart: always
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
