name: Plataforma MEH CI/CD

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install Backend Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov httpx "python-jose[cryptography]"
          
      - name: Lint with flake8
        run: |
          cd backend
          # Analiza solo el código fuente, excluyendo librerías externas para evitar falsos positivos
          flake8 . --count --exclude=venv --select=E9,F63,F7,F82 --show-source --statistics
          
      - name: Run Backend Tests
        run: |
          cd backend
          # Variables ficticias para el entorno de pruebas en CI
          export SECRET_KEY="test_secret_for_ci_2026"
          export DATABASE_URL="sqlite:///./test.db"
          # Asegura que Python reconozca la carpeta actual para encontrar el módulo 'app'
          export PYTHONPATH=$PYTHONPATH:.
          pytest tests/test_master_suite.py

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install
          
      - name: Build Check
        run: |
          cd frontend
          npm run build
