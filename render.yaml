services:
  - type: web
    name: api-plataforma-meh
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python seed_user.py && gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false # Lo pondremos manualmente en el panel de Render
      - key: SECRET_KEY
        generateValue: true # Render creará una clave segura por ti
      - key: ALGORITHM
        value: HS256
