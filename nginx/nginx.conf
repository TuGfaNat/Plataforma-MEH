events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Reverse proxy para Plataforma MEH
    server {
        listen 80;
        server_name _;

        client_max_body_size 100M;

        # ──────────────────────
        # Backend API
        #   /api/auth/*    → backend:8000/auth/*
        #   /api/cursos/*  → backend:8000/cursos/*
        #   ... (todos los routers de FastAPI se mapean automáticamente)
        # ──────────────────────
        location /api/ {
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Soporte para WebSocket (si se necesita)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_buffering off;
            proxy_read_timeout 90s;
        }

        # ──────────────────────
        # Documentación (Docusaurus) — assets estáticos con cacheo
        # ──────────────────────
        location ~ ^/docs/.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            proxy_pass http://website:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ──────────────────────
        # Documentación (Docusaurus)
        #   Pasa la ruta completa SIN strip del prefijo /docs/
        #   Esto coincide con baseUrl: "/docs/" en docusaurus.config.js
        # ──────────────────────
        location /docs/ {
            proxy_pass http://website:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ──────────────────────
        # Frontend (React SPA) — assets estáticos con cacheo
        # ──────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|json|webp)$ {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ──────────────────────
        # Frontend (React SPA) — todo lo demás
        #   Incluye ruta raíz, /dashboard, /login, etc.
        #   El fallback a index.html lo maneja el propio nginx del frontend
        # ──────────────────────
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}